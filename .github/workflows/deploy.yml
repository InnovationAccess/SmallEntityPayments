name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  # THIS line is what creates the "Run workflow" button in the GitHub UI!
  workflow_dispatch: 

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: uspto-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for secure Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        # Note: We build the container from the ./api folder where the Dockerfile lives
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/uspto-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} ./api
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/uspto-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/uspto-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            API_SECRET=${{ secrets.API_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ALLOWED_ORIGINS=*
